name: Car Data Scraper

on:
  schedule:
    - cron: "0 2,14 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        if: always()
        run: |
          python -m playwright install --with-deps

      - name: Debug runner info
        run: |
          echo "=== Runner info ==="
          uname -a || true
          lsb_release -a || true
          echo "=== Python & Pip ==="
          python -V || true
          pip -V || true
          pip list --format=columns || true
          echo "=== Playwright (python) ==="
          python -c "import importlib; m=importlib.util.find_spec('playwright'); print('found', bool(m))" || true

      - name: Run scraper
        env:
          MAX_MAKES: "15"
          YEAR_COUNT: "3"
        run: |
          set -e
          python scraper.py 2>&1 | tee workflow.log

      - name: Commit outputs if changed
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add output/cars.xlsx output/cars.csv
          git diff --staged --quiet && echo "No data changes to commit." && exit 0

          git commit -m "Update car dataset"
          git push

      - name: Upload logs and outputs
        uses: actions/upload-artifact@v4
        with:
          name: scrape-artifacts
          path: |
            workflow.log
            output/cars.csv
            output/cars.xlsx
