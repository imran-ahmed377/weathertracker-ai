name: Weather Dashboard Pipeline

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: weather-dashboard-pipeline
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-weather:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build weather dataset and dashboard
        env:
          PAST_DAYS: "30"
          FORECAST_DAYS: "7"
        run: |
          set -e
          python weather_dashboard.py 2>&1 | tee workflow.log

      - name: Publish generated files to bot branch
        env:
          BOT_BRANCH: bot/weather-data
        run: |
          set -e
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          if git ls-remote --exit-code --heads origin "$BOT_BRANCH"; then
            git fetch origin "$BOT_BRANCH"
            git worktree add -B "$BOT_BRANCH" ../bot-worktree "origin/$BOT_BRANCH"
          else
            git worktree add -b "$BOT_BRANCH" ../bot-worktree
          fi

          find ../bot-worktree -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          mkdir -p ../bot-worktree/output ../bot-worktree/docs

          rsync -a --delete output/ ../bot-worktree/output/
          rsync -a --delete docs/ ../bot-worktree/docs/

          pushd ../bot-worktree
          git add -A
          git diff --staged --quiet && echo "No data changes to commit." && exit 0

          git commit -m "Update weather dashboard data"
          git push origin "$BOT_BRANCH"
          popd

      - name: Upload logs and outputs
        uses: actions/upload-artifact@v4
        with:
          name: weather-artifacts
          path: |
            workflow.log
            output/weather_daily.csv
            output/weather_observations.csv
            docs/index.html
            docs/charts

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: build-weather
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
